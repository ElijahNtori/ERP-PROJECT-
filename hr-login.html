<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Recruitment System - HR Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body class="hr-login-page">
    <div class="login-container">
        <div class="login-card hr-login">
            <div class="login-header">
                <h1>HR Administrator Login</h1>
                <p>Sign in to post jobs and manage applications</p>
            </div>
            
            <form id="hrLoginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="login-btn">Login</button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="hr-signup.html">Sign up as HR Admin</a></p>
                <p><a href="index.html">← Back to Role Selection</a></p>
            </div>
        </div>
    </div>
    
    <script src="hr-login.js"></script>
</body>
</html>
